spring:
  application:
    name: ms-proveedores
  datasource:
    url: "jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bd_proveedores}"
    username: "${DB_USER:root}"
    password: "${DB_PASSWORD:}"
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: "classpath:db/migration"
server:
  port: "${PORT:8087}"
jwt:
  secret: "${JWT_SECRET:mi_clave_super_secreta_para_supplyhub_2026_muy_larga_segura}"
eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_URL:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true
logging:
  level:
    root: INFO
