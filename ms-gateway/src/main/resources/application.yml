spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ms-auth
              uri: lb://ms-auth
              predicates:
                - Path=/auth/**
            - id: ms-clientes
              uri: lb://ms-clientes
              predicates:
                - Path=/api/v1/clientes/**
            - id: ms-proveedores
              uri: lb://ms-proveedores
              predicates:
                - Path=/api/v1/proveedores/**
            - id: ms-categorias
              uri: lb://ms-categorias
              predicates:
                - Path=/api/v1/categorias/**
            - id: ms-productos
              uri: lb://ms-productos
              predicates:
                - Path=/api/v1/productos/**
            - id: ms-cotizaciones
              uri: lb://ms-cotizaciones
              predicates:
                - Path=/api/v1/cotizaciones/**
            - id: ms-inventario
              uri: lb://ms-inventario
              predicates:
                - Path=/api/v1/inventario/**
            - id: ms-ordenes-compra
              uri: lb://ms-ordenes-compra
              predicates:
                - Path=/api/v1/ordenes-compra/**
            - id: ms-pagos
              uri: lb://ms-pagos
              predicates:
                - Path=/api/v1/pagos/**
            - id: ms-despachos
              uri: lb://ms-despachos
              predicates:
                - Path=/api/v1/despachos/**

server:
  port: ${PORT:8099}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
